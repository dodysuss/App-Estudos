name: app-estudos

services:
  database:
    image: postgres:16-alpine
    container_name: app-estudos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app_estudos
      POSTGRES_PASSWORD: app_estudos_local
      POSTGRES_DB: app_estudos
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_estudos -d app_estudos"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - app_estudos_postgres_data:/var/lib/postgresql/data

volumes:
  app_estudos_postgres_data:
